AWSTemplateFormatVersion: 2010-09-09
Description: Template CloudFormation para criar uma instancia EC2 Linux com servidor web Apache e acesso SSH.

Parameters:
  LatestAmiId:
    Description: ID da AMI mais recente do Amazon Linux 2 obtida pelo AWS Systems Manager Parameter Store.
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

  InstanceType:
    Description: Tipo da instancia EC2 usada pelo servidor web.
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    ConstraintDescription: Informe um tipo de instancia valido para este laboratorio.

  KeyName:
    Description: Nome do par de chaves EC2 usado para acesso SSH.
    Type: AWS::EC2::KeyPair::KeyName
    Default: ChavesLinux

  MyIP:
    Description: Endereco IP autorizado para acessar HTTP e SSH em formato CIDR, por exemplo 203.0.113.1/32.
    Type: String
    MinLength: 9
    MaxLength: 18
    Default: 0.0.0.0/0
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Informe um intervalo CIDR valido no formato x.x.x.x/x.

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permite acesso HTTP ao servidor web.
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref MyIP
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
      Tags:
        - Key: Name
          Value: dio-webserver-sg
        - Key: Project
          Value: dio-cloudformation

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          cat <<'HTML' > /var/www/html/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>DIO CloudFormation</title>
          </head>
          <body>
            <h1>Minha primeira stack com AWS CloudFormation</h1>
            <p>Servidor web provisionado automaticamente com Infrastructure as Code.</p>
          </body>
          </html>
          HTML
      Tags:
        - Key: Name
          Value: dio-webserver
        - Key: Project
          Value: dio-cloudformation

Outputs:
  InstanceId:
    Description: ID da instancia EC2 criada pela stack.
    Value: !Ref WebServer

  WebsiteURL:
    Description: URL publica do servidor web.
    Value: !Sub http://${WebServer.PublicDnsName}

  SSHCommand:
    Description: Comando base para conexao SSH usando a chave privada baixada.
    Value: !Sub ssh -i ${KeyName}.pem ec2-user@${WebServer.PublicDnsName}

  SecurityGroupId:
    Description: ID do Security Group criado para o servidor web.
    Value: !Ref WebServerSecurityGroup
